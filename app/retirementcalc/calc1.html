<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Retirement Simulator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; line-height: 1.6; margin: 20px; background: #f4f7f9; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #edf2f7; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 20px; }
        .input-group { margin-bottom: 18px; position: relative; }
        
        /* Tooltip Styles */
        .help-icon { display: inline-block; width: 18px; height: 18px; background: #a0aec0; color: white; border-radius: 50%; text-align: center; font-size: 12px; font-weight: bold; cursor: help; margin-left: 5px; vertical-align: middle; line-height: 18px; }
        .help-icon:hover::after { content: attr(data-tip); position: absolute; left: 0; top: -65px; background: #2d3748; color: white; padding: 12px; border-radius: 6px; font-size: 0.8em; width: 280px; z-index: 100; font-weight: normal; line-height: 1.4; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        label { display: block; font-weight: 600; font-size: 0.9em; margin-bottom: 6px; color: #4a5568; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; box-sizing: border-box; font-size: 1em; background: #fff; }
        
        .checkbox-group { display: flex; align-items: center; margin-bottom: 15px; background: #f8fafc; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; }
        .checkbox-group input { width: auto; margin-right: 12px; }
        
        .advanced-fields { display: none; padding: 15px; background: #fdfdfd; border: 1px dashed #cbd5e0; border-radius: 6px; margin-bottom: 18px; }
        
        button { width: 100%; padding: 16px; background: #2b6cb0; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1.1em; font-weight: 700; transition: background 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button:hover { background: #2c5282; }
        
        /* Stats */
        .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-top: 25px; }
        .stat { background: #f0fff4; padding: 20px; border-radius: 10px; border: 1px solid #c6f6d5; text-align: center; }
        .stat.warning { background: #fff5f5; border-color: #feb2b2; }
        .stat h3 { margin: 0; font-size: 0.85em; color: #2f855a; text-transform: uppercase; }
        .stat.warning h3 { color: #c53030; }
        .stat p { margin: 8px 0 0; font-size: 1.5em; font-weight: 800; color: #22543d; }
        .stat.warning p { color: #742a2a; }
        
        /* Table */
        .table-wrap { overflow-x: auto; margin-top: 35px; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.9em; }
        th { background: #edf2f7; text-align: left; padding: 14px; border-bottom: 2px solid #cbd5e0; color: #4a5568; white-space: nowrap; }
        td { padding: 12px 14px; border-bottom: 1px solid #edf2f7; }
        .today-dollars { background-color: #ebf8ff; font-weight: 600; color: #2b6cb0; }
        .exhausted-row { background-color: #fff5f5; color: #c53030; font-weight: bold; }
        
        .chart-container { margin-top: 35px; height: 450px; background: white; padding: 15px; border-radius: 10px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Retirement Strategy Simulator ⚖️</h2>
    
    <div class="grid">
        <div class="input-section">
            <div class="input-group">
                <label>Starting Portfolio Value ($) <span class="help-icon" data-tip="The total value of your investment accounts at the start of the simulation.">?</span></label>
                <input type="number" id="startValue" value="1000000">
            </div>
            
            <div class="input-group">
                <label>Withdrawal Strategy <span class="help-icon" data-tip="Fixed: Withdraw a specific 'take-home' amount monthly (adjusted for inflation). Percentage: Withdraw a % of the current balance annually.">?</span></label>
                <select id="withdrawType" onchange="updateWithdrawLabel()">
                    <option value="fixed">Fixed Monthly Net (In Today's Dollars)</option>
                    <option value="percent">Annual % of Current Portfolio</option>
                </select>
            </div>

            <div class="input-group">
                <label id="withdrawLabel">Monthly Net Amount ($) <span class="help-icon" data-tip="The monthly amount you want in your pocket after taxes, in today's purchasing power.">?</span></label>
                <input type="number" id="withdrawVal" value="4000">
            </div>

            <div class="input-group">
                <label>Stagnation Period (Years) <span class="help-icon" data-tip="A period at the START with 0% growth. The calculator adjusts the remaining years to hit the overall CAGR target.">?</span></label>
                <input type="number" id="stagnationYears" value="10">
            </div>
        </div>
        
        <div class="input-section">
            <div class="input-group">
                <label>Overall Growth Rate (%) <span class="help-icon" data-tip="The target Compound Annual Growth Rate (CAGR) for the entire 50-year period.">?</span></label>
                <input type="number" id="growthRate" value="6">
            </div>
            <div class="input-group">
                <label>Annual Inflation Rate (%) <span class="help-icon" data-tip="Assumed annual inflation. Your monthly spending goals will be increased to match this.">?</span></label>
                <input type="number" id="inflationRate" value="2.5">
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="advancedToggle" onchange="toggleAdvanced()">
                <label for="advancedToggle" style="margin-bottom:0">Multiple Tax Rates (Advanced) <span class="help-icon" data-tip="Enable this to switch to a different tax rate at a specific year (e.g., when reaching RMD age).">?</span></label>
            </div>

            <div class="input-group" id="tax1Group">
                <label>Primary Tax Rate (%) <span class="help-icon" data-tip="The effective tax rate applied to your withdrawals.">?</span></label>
                <input type="number" id="tax1" value="15">
            </div>

            <div id="advancedFields" class="advanced-fields">
                <div class="input-group">
                    <label>Switch after Year (N) <span class="help-icon" data-tip="The year index after which the secondary tax rate is applied.">?</span></label>
                    <input type="number" id="switchYear" value="15">
                </div>
                <div class="input-group">
                    <label>Secondary Tax Rate (%) <span class="help-icon" data-tip="The tax rate applied from Year N+1 onwards.">?</span></label>
                    <input type="number" id="tax2" value="20">
                </div>
            </div>

            <div class="input-group">
                <label>Years to Simulate <span class="help-icon" data-tip="The total length of the simulation (Default is 50 years).">?</span></label>
                <input type="number" id="years" value="50">
            </div>
        </div>
    </div>

    <button onclick="simulate()">Run Financial Simulation</button>

    <div class="summary" id="summaryArea"></div>

    <div class="chart-container">
        <canvas id="retirementChart"></canvas>
    </div>

    <div class="table-wrap">
        <table id="resultsTable">
            <thead>
                <tr>
                    <th>Year</th>
                    <th>Portfolio (Nominal)</th>
                    <th>Portfolio (In Today's $)</th>
                    <th>Net Monthly (Nominal)</th>
                    <th>Net Monthly (In Today's $)</th>
                    <th>Annual Growth %</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let myChart = null;

function updateWithdrawLabel() {
    const type = document.getElementById('withdrawType').value;
    const label = document.getElementById('withdrawLabel');
    const input = document.getElementById('withdrawVal');
    if (type === 'fixed') {
        label.innerHTML = `Monthly Net Amount ($) <span class="help-icon" data-tip="Take-home cash you want in today's purchasing power.">?</span>`;
        input.value = "4000";
    } else {
        label.innerHTML = `Annual Withdrawal % <span class="help-icon" data-tip="Percent of current portfolio balance withdrawn each year.">?</span>`;
        input.value = "4";
    }
}

function toggleAdvanced() {
    const isChecked = document.getElementById('advancedToggle').checked;
    document.getElementById('advancedFields').style.display = isChecked ? 'block' : 'none';
}

function simulate() {
    const startValue = parseFloat(document.getElementById('startValue').value);
    const withdrawType = document.getElementById('withdrawType').value;
    const withdrawVal = parseFloat(document.getElementById('withdrawVal').value);
    const targetCAGR = parseFloat(document.getElementById('growthRate').value) / 100;
    const inflationRate = parseFloat(document.getElementById('inflationRate').value) / 100;
    const stagnationM = parseInt(document.getElementById('stagnationYears').value);
    const tax1 = parseFloat(document.getElementById('tax1').value) / 100;
    const tax2 = parseFloat(document.getElementById('tax2').value) / 100;
    const isAdvanced = document.getElementById('advancedToggle').checked;
    const switchYear = parseInt(document.getElementById('switchYear').value);
    const totalYears = parseInt(document.getElementById('years').value);

    // RECOVERY CALCULATION (User's Formula)
    let recoveryGrowth = targetCAGR;
    if (stagnationM > 0 && stagnationM < totalYears) {
        // Math.pow((1 + targetRate), totalYears / (totalYears - M)) - 1
        recoveryGrowth = Math.pow(1 + targetCAGR, totalYears / (totalYears - stagnationM)) - 1;
    }

    let portfolio = startValue;
    let dataNominal = [];
    let dataReal = [];
    let labels = [];
    let tableHtml = "";
    let exhaustedYear = null;

    for (let year = 1; year <= totalYears; year++) {
        let currentTaxRate = (isAdvanced && year > switchYear) ? tax2 : tax1;
        let inflationMultiplier = Math.pow(1 + inflationRate, year - 1);
        let annualGrowthRate = (year <= stagnationM) ? 0 : recoveryGrowth;
        
        let annualGrossNominal;
        let monthlyNetNominal;
        let monthlyNetInTodaysDollars;

        // Withdrawal Logic
        if (withdrawType === 'fixed') {
            monthlyNetInTodaysDollars = withdrawVal;
            monthlyNetNominal = monthlyNetInTodaysDollars * inflationMultiplier;
            annualGrossNominal = (monthlyNetNominal * 12) / (1 - currentTaxRate);
        } else {
            let annualGross = portfolio * (withdrawVal / 100);
            annualGrossNominal = annualGross;
            let annualNet = annualGross * (1 - currentTaxRate);
            monthlyNetNominal = annualNet / 12;
            monthlyNetInTodaysDollars = monthlyNetNominal / inflationMultiplier;
        }

        // Subtract Withdrawal (before growth - conservative)
        if (portfolio >= annualGrossNominal) {
            portfolio -= annualGrossNominal;
        } else {
            if (!exhaustedYear && portfolio > 0) exhaustedYear = year;
            annualGrossNominal = Math.max(0, portfolio);
            monthlyNetNominal = (annualGrossNominal * (1 - currentTaxRate)) / 12;
            monthlyNetInTodaysDollars = monthlyNetNominal / inflationMultiplier;
            portfolio = 0;
        }

        // Apply Growth
        portfolio *= (1 + annualGrowthRate);
        
        let endYearInflation = Math.pow(1 + inflationRate, year);
        let portfolioReal = portfolio / endYearInflation;
        
        dataNominal.push(portfolio.toFixed(0));
        dataReal.push(portfolioReal.toFixed(0));
        labels.push("Year " + year);

        let rowClass = (portfolio <= 0 && exhaustedYear === year) ? "exhausted-row" : "";

        tableHtml += `<tr class="${rowClass}">
            <td>${year}</td>
            <td>$${portfolio.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
            <td class="today-dollars">$${portfolioReal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
            <td>$${monthlyNetNominal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
            <td class="today-dollars">$${monthlyNetInTodaysDollars.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
            <td>${(annualGrowthRate * 100).toFixed(2)}%</td>
        </tr>`;

        if (portfolio <= 0 && year > (exhaustedYear || totalYears)) break;
    }

    document.getElementById('tableBody').innerHTML = tableHtml;
    const finalReal = parseFloat(dataReal[dataReal.length - 1]);
    
    const summaryArea = document.getElementById('summaryArea');
    summaryArea.innerHTML = `
        <div class="stat"><h3>End Value (Today's $)</h3><p>$${finalReal.toLocaleString()}</p></div>
        <div class="stat"><h3>Recovery Growth Rate</h3><p>${(recoveryGrowth * 100).toFixed(2)}%</p></div>
        <div class="stat ${exhaustedYear ? 'warning' : ''}"><h3>Sustainability</h3><p>${exhaustedYear ? 'Exhausted Year ' + exhaustedYear : 'Sustainable'}</p></div>
    `;

    updateChart(labels, dataNominal, dataReal);
}

function updateChart(labels, dataNominal, dataReal) {
    const ctx = document.getElementById('retirementChart').getContext('2d');
    if (myChart) myChart.destroy();
    myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: "In Today's Dollars (Purchasing Power)",
                data: dataReal,
                borderColor: '#2b6cb0',
                backgroundColor: 'rgba(43, 108, 176, 0.1)',
                fill: true,
                tension: 0.1,
                borderWidth: 3,
                pointRadius: 0
            }, {
                label: 'Nominal Value (Face Value)',
                data: dataNominal,
                borderColor: '#cbd5e0',
                borderDash: [5, 5],
                fill: false,
                tension: 0.1,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { tooltip: { mode: 'index', intersect: false } },
            scales: { y: { ticks: { callback: value => '$' + value.toLocaleString() } } }
        }
    });
}
simulate();
</script>
</body>
</html>
